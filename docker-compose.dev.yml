version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-forge}
      POSTGRES_USER: ${POSTGRES_USER:-forge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forge} -d ${POSTGRES_DB:-forge}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  indexer:
    build: .
    command: ["forge", "dev"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-forge}:${POSTGRES_PASSWORD:-forge}@postgres:5432/${POSTGRES_DB:-forge}
      RPC_URL_1: ${RPC_URL_1}
      RPC_URL_8453: ${RPC_URL_8453:-}
      FORGE_ENV: dev
      FORGE_PORT: ${FORGE_PORT:-42069}
      FORGE_SCHEMA: ${FORGE_SCHEMA:-public}
      FORGE_LOG_LEVEL: ${FORGE_LOG_LEVEL:-debug}
      RUST_LOG: ${FORGE_LOG_LEVEL:-debug}
    volumes:
      - ./:/app
    ports:
      - "${FORGE_PORT:-42069}:42069"
    restart: unless-stopped

volumes:
  postgres_data:
