version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-forge}
      POSTGRES_USER: ${POSTGRES_USER:-forge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forge} -d ${POSTGRES_DB:-forge}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  indexer:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-forge}:${POSTGRES_PASSWORD:-forge}@postgres:5432/${POSTGRES_DB:-forge}
      RPC_URL_1: ${RPC_URL_1}
      RPC_URL_8453: ${RPC_URL_8453:-}
      FORGE_ENV: ${FORGE_ENV:-prod}
      FORGE_PORT: ${FORGE_PORT:-42069}
      FORGE_SCHEMA: ${FORGE_SCHEMA:-public}
      FORGE_LOG_LEVEL: ${FORGE_LOG_LEVEL:-info}
      FORGE_API_KEY: ${FORGE_API_KEY:-}
      FORGE_RPC_RATE_LIMIT: ${FORGE_RPC_RATE_LIMIT:-25}
      RUST_LOG: ${FORGE_LOG_LEVEL:-info}
    volumes:
      - ./src:/app/src:ro
    ports:
      - "${FORGE_PORT:-42069}:42069"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    depends_on:
      - prometheus
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:
